<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f3f4f6;
    }
    .container {
      width: 100%;
      max-width: 1600px;
      margin: auto;
      background-color: #f9fafb;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }
    .content-shell {
      padding: 20px 24px 24px;
      background-color: #f9fafb;
    }
    .content-card {
      max-width: 540px;
      margin: 0 auto;
    }
    .status-header {
      color: #ffffff;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 600;
      padding: 20px 24px;
      border-radius: 10px 10px 0 0;
    }
    .content {
      padding: 0 0 8px;
    }
    .details-card {
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }
    .details-table {
      width: 100%;
      border-collapse: collapse;
    }
    .details-table td {
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      line-height: 1.35;
      vertical-align: top;
    }
    .details-table tr:last-child td {
      border-bottom: 0;
    }
    .label {
      width: 40%;
      color: #6b7280;
      font-weight: 400;
    }
    .value {
      color: #111827;
      font-weight: 500;
      word-break: break-word;
    }
    .value-link {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }
    .value-link:hover {
      text-decoration: underline;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      text-decoration: none;
      color: #ffffff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }
    .footer {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
    .status-row .label {
      font-weight: 700;
    }
    .status-row .value {
      color: __STATUS_COLOR__;
      font-weight: 700;
    }
    @media only screen and (max-width: 640px) {
      body {
        padding: 12px;
      }
      .content-shell {
        padding: 16px;
      }
      .content-card {
        max-width: none;
      }
      .status-header {
        font-size: 20px;
        padding: 18px 16px;
      }
      .content {
        padding: 0;
      }
      .container {
        background-color: #f9fafb;
      }
      .details-table td {
        padding: 12px;
        font-size: 16px;
      }
      .btn {
        width: 100%;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="content-shell">
    <div class="content-card">
      <div class="status-header" style="background-color: __STATUS_COLOR__;">
        __STATUS_TEXT__
      </div>

      <div class="content">
        <div class="details-card">
          <table class="details-table">
            <tr class="status-row">
              <td class="label">Status</td>
              <td class="value">__STATUS_TEXT__</td>
            </tr>
            <tr>
              <td class="label">Repository</td>
              <td class="value">__REPOSITORY__</td>
            </tr>
            <tr>
              <td class="label">Workflow</td>
              <td class="value">__WORKFLOW__</td>
            </tr>
            <tr>
              <td class="label">Branch</td>
              <td class="value">__BRANCH__</td>
            </tr>
            <tr>
              <td class="label">Run Number</td>
              <td class="value">#__RUN_NUMBER__</td>
            </tr>
            <tr>
              <td class="label">Commit</td>
              <td class="value">__COMMIT__</td>
            </tr>
            <tr>
              <td class="label">Triggered By</td>
              <td class="value">__ACTOR__</td>
            </tr>
            <tr>
              <td class="label">Build Logs</td>
              <td class="value"><a class="value-link" href="__RUN_URL__">Open Workflow Run</a></td>
            </tr>
          </table>
        </div>
      </div>

      <div style="text-align:center;">
        <a href="__RUN_URL__"
           class="btn"
           style="background-color: __STATUS_COLOR__;">
           View Details
        </a>
      </div>

      <div class="footer">
        This is an automated notification from your CI/CD pipeline.
      </div>
    </div>
  </div>
</div>

</body>
</html>
